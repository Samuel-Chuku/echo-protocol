name: Deploy backend (indexer + ops)

# Build the two backend images in CI (plenty of RAM + fast network — no more VPS OOM on `sharp`),
# push them to GHCR, then SSH to the VPS and swap the running containers for the fresh images.
# The web app is NOT here — it auto-deploys via Vercel.

on:
  push:
    branches: [main]
    # Only rebuild when something that lands in the backend image changes.
    paths:
      - 'apps/indexer/**'
      - 'apps/ops/**'
      - 'packages/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'Caddyfile'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: {} # manual "Run workflow" button for redeploys without a code change

# Never let two deploys run at once — if you push twice quickly, the second waits for the first to
# finish rather than racing it on the VPS (git pull / compose up stepping on each other).
concurrency:
  group: deploy-backend
  cancel-in-progress: false # let an in-flight deploy finish; don't interrupt a live swap

# Lowercase the owner once — GHCR image paths must be lowercase (Samuel-Chuku → samuel-chuku).
env:
  REGISTRY: ghcr.io
  OWNER: samuel-chuku

jobs:
  build:
    name: Build & push backend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR with the auto-provisioned GITHUB_TOKEN — no PAT needed
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # ONE image runs both backends (indexer + ops) — the app is chosen at runtime via APP_DIR.
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/echo-backend
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Persist the layer cache in the Actions cache so repeat builds reuse the (heavy) install
          # layer — a source-only change then rebuilds in seconds. Also read the old per-app scope so
          # this first single-image build warms from the existing install layer instead of going cold.
          cache-from: |
            type=gha,scope=backend
            type=gha,scope=indexer
          cache-to: type=gha,mode=max,scope=backend

  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read # the token is forwarded to the VPS to `docker login` + pull the private images
    steps:
      - name: SSH → pull images → recreate containers
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          # appleboy kills the remote script after `command_timeout` (default 10m). A COLD image pull
          # on a small VPS extracts every layer from scratch and can exceed that — bump it well past.
          # Later deploys only fetch changed layers, so they finish in a fraction of this.
          command_timeout: 40m
          # GITHUB_TOKEN is short-lived (this job only) and has read access to our GHCR packages, so
          # the VPS can pull private images without us storing a long-lived PAT on the box.
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            set -e
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd ${{ secrets.VPS_APP_PATH || '~/echo-protocol' }}
            git pull --ff-only origin main
            # Reclaim disk BEFORE the pull — the incoming image and the still-running old one must
            # briefly coexist, and this small VPS fills mid-extract otherwise ("no space left on
            # device"). -a removes unused images (not just dangling); the running containers' image is
            # kept, so this is safe. NEVER --volumes (Caddy's TLS certs live in a named volume).
            docker image prune -af || true
            docker builder prune -af || true
            docker compose pull indexer ops
            docker compose up -d indexer ops
            docker logout ghcr.io
            docker image prune -af || true
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
