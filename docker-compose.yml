# Always-on backends for Echo on a single VPS, fronted by Caddy (auto-HTTPS).
#
#   indexer  → api.$DOMAIN   (GraphQL, :4000)
#   ops      → ops.$DOMAIN   (operator dashboard, :4100)
#
# Before `docker compose up -d --build`, on the VPS:
#   1. Create apps/indexer/.env and apps/ops/.env (from their .env.example) — these hold
#      DATABASE_URL (Supabase), ARC_RPC_URL, OPS_TOTP_SECRET, etc. They are gitignored, so
#      they are NOT in the clone; you create them on the host.
#   2. Set DOMAIN and ACME_EMAIL below (or in a root .env that compose reads).
#
# The app ports are NOT published to the host — only Caddy is. The backends are reachable
# only inside the compose network and through Caddy.

services:
  # Both backends run from ONE image (built + pushed to GHCR by .github/workflows/deploy-backend.yml).
  # The image carries both apps; each service picks which to run via APP_DIR. The VPS just
  # `docker compose pull`s it — no on-box build (that was OOMing on sharp). `build:` is kept so a
  # local `docker compose up --build` still works for development.
  indexer:
    image: ghcr.io/samuel-chuku/echo-backend:latest
    build:
      context: .
    environment:
      APP_DIR: apps/indexer
      # Tee console output to the shared log volume so the ops dashboard can tail it (/api/logs).
      LOG_FILE: /var/log/echo/indexer.log
      # Arc's public RPC rate-limits per IP; 4s polling was part of what got us penalized. 15s
      # steady-state is plenty for a feed UI. This `environment` entry outranks apps/indexer/.env,
      # so the knob is INDEXER_POLL_MS in the VPS root .env.
      POLL_INTERVAL_MS: ${INDEXER_POLL_MS:-15000}
    env_file: [apps/indexer/.env]
    restart: unless-stopped
    expose: ["4000"]
    volumes:
      - echo_logs:/var/log/echo

  ops:
    image: ghcr.io/samuel-chuku/echo-backend:latest
    build:
      context: .
    env_file: [apps/ops/.env]
    # APP_DIR selects the ops app from the shared image. OPS_HOST override lets Caddy (a sibling
    # container) reach it — not published to the host, so 0.0.0.0 stays private to the compose net.
    # INDEXER_GRAPHQL_URL reaches the indexer by service name, not 127.0.0.1 (that's ops itself).
    environment:
      APP_DIR: apps/ops
      OPS_HOST: 0.0.0.0
      INDEXER_GRAPHQL_URL: http://indexer:4000/graphql
      # Ops both writes its own log here and serves tails of every app's log (/api/logs).
      LOG_FILE: /var/log/echo/ops.log
      LOG_DIR: /var/log/echo
    restart: unless-stopped
    expose: ["4100"]
    volumes:
      - echo_logs:/var/log/echo

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in a root .env or the shell}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
      # Basic-auth gate in front of ops. (see Caddyfile). Set both in the VPS root .env.
      OPS_BASICAUTH_USER: ${OPS_BASICAUTH_USER:?set OPS_BASICAUTH_USER in the root .env}
      OPS_BASICAUTH_HASH: ${OPS_BASICAUTH_HASH:?set OPS_BASICAUTH_HASH (caddy hash-password) in the root .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [indexer, ops]

volumes:
  caddy_data:
  caddy_config:
  # Shared by indexer + ops: each tees its console to <app>.log (5MB, one rotation — bounded), the
  # ops /api/logs endpoint tails them for the dashboard's Logs tab.
  echo_logs:
