[profile.default]
src = "src"
out = "out"
libs = ["lib"]
cache_path = "cache"
evm_version = "paris"
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
# via_ir TURNED BACK OFF in P5 (fast builds restored). P4 had to enable it because MarketRegistry
# carried all four mode lifecycles inline and crossed the 24576-byte EIP-170 limit (25950 bytes).
# P5 extracted the Bounty lifecycle into the EchoBounty delegatecall library (spec §8 "keep proxies
# lean"), dropping the registry's runtime bytecode under the limit again — so the legacy (non-IR)
# pipeline the live proxies were originally deployed under is back. Storage layout is identical
# either way (verified via `forge inspect storageLayout`); the library holds no storage.
via_ir = false
gas_reports = ["*"]

[fuzz]
runs = 256

[invariant]
runs = 256
depth = 32

[rpc_endpoints]
arc_testnet = "${ARC_TESTNET_RPC_URL}"

[etherscan]
arc_testnet = { key = "", url = "https://testnet.arcscan.app/api" }
