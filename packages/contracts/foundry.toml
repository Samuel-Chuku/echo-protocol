[profile.default]
src = "src"
out = "out"
libs = ["lib"]
cache_path = "cache"
evm_version = "paris"
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
gas_reports = ["*"]

[fuzz]
runs = 256

[invariant]
runs = 256
depth = 32

[rpc_endpoints]
arc_testnet = "${ARC_TESTNET_RPC_URL}"

[etherscan]
arc_testnet = { key = "", url = "https://testnet.arcscan.app/api" }
